name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Test Identity Service
      run: dotnet test src/services/Identity/AgroSolutions.Identity.Tests/AgroSolutions.Identity.Tests.csproj --no-build --verbosity normal --configuration Release
    
    - name: Test Ingestion Service
      run: dotnet test src/services/Ingestion/AgroSolutions.Ingestion.Tests/AgroSolutions.Ingestion.Tests.csproj --no-build --verbosity normal --configuration Release
    
    - name: Test Alerts Service
      run: dotnet test src/services/Alerts/AgroSolutions.Alerts.Tests/AgroSolutions.Alerts.Tests.csproj --no-build --verbosity normal --configuration Release

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    strategy:
      matrix:
        service: [Identity, Property, Ingestion, Alerts]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build ${{ matrix.service }} Service
      run: |
        docker build -t agrosolutions-${{ matrix.service | lower }}-api:${{ github.sha }} \
          -f src/services/${{ matrix.service }}/Dockerfile \
          src/services/${{ matrix.service }}
    
    - name: Build ${{ matrix.service }} Service (latest)
      run: |
        docker build -t agrosolutions-${{ matrix.service | lower }}-api:latest \
          -f src/services/${{ matrix.service }}/Dockerfile \
          src/services/${{ matrix.service }}

  push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    strategy:
      matrix:
        service: [Identity, Property, Ingestion, Alerts]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and Push ${{ matrix.service }}
      uses: docker/build-push-action@v5
      with:
        context: src/services/${{ matrix.service }}
        file: src/services/${{ matrix.service }}/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/agrosolutions-${{ matrix.service | lower }}:latest
          ${{ secrets.DOCKER_USERNAME }}/agrosolutions-${{ matrix.service | lower }}:${{ github.sha }}