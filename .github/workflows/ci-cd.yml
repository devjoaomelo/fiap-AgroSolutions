name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore and Build Identity
      run: |
        cd src/services/Identity
        dotnet restore
        dotnet build --configuration Release --no-restore
    
    - name: Restore and Build Ingestion
      run: |
        cd src/services/Ingestion
        dotnet restore
        dotnet build --configuration Release --no-restore
    
    - name: Restore and Build Alerts
      run: |
        cd src/services/Alerts
        dotnet restore
        dotnet build --configuration Release --no-restore
    
    - name: Restore and Build Property
      run: |
        cd src/services/Property
        dotnet restore
        dotnet build --configuration Release --no-restore
    
    - name: Test Identity Service
      run: dotnet test src/services/Identity/AgroSolutions.Identity.Tests/AgroSolutions.Identity.Tests.csproj --configuration Release
    
    - name: Test Ingestion Service
      run: dotnet test src/services/Ingestion/AgroSolutions.Ingestion.Tests/AgroSolutions.Ingestion.Tests.csproj --configuration Release
    
    - name: Test Alerts Service
      run: dotnet test src/services/Alerts/AgroSolutions.Alerts.Tests/AgroSolutions.Alerts.Tests.csproj --configuration Release

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    strategy:
      matrix:
        service: [identity, property, ingestion, alerts]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build ${{ matrix.service }} Service
      run: |
        SERVICE_CAPITAL=$(echo "${{ matrix.service }}" | awk '{print toupper(substr($0,1,1)) tolower(substr($0,2))}')
        docker build -t agrosolutions-${{ matrix.service }}-api:${{ github.sha }} \
          -f src/services/${SERVICE_CAPITAL}/Dockerfile \
          src/services/${SERVICE_CAPITAL}

  push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    strategy:
      matrix:
        service: [identity, property, ingestion, alerts]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and Push ${{ matrix.service }}
      run: |
        SERVICE_CAPITAL=$(echo "${{ matrix.service }}" | awk '{print toupper(substr($0,1,1)) tolower(substr($0,2))}')
        docker buildx build --platform linux/amd64,linux/arm64 \
          -f src/services/${SERVICE_CAPITAL}/Dockerfile \
          -t ${{ secrets.DOCKER_USERNAME }}/agrosolutions-${{ matrix.service }}:latest \
          -t ${{ secrets.DOCKER_USERNAME }}/agrosolutions-${{ matrix.service }}:${{ github.sha }} \
          --push \
          src/services/${SERVICE_CAPITAL}