apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-api
  namespace: agrosolutions
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity-api
  template:
    metadata:
      labels:
        app: identity-api
    spec:
      containers:
      - name: identity-api
        image: devjoaomelo/agrosolutions-identity:latest
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: agrosolutions-config
              key: ASPNETCORE_ENVIRONMENT
        - name: ConnectionStrings__DefaultConnection
          value: "Host=$(IDENTITY_DB_HOST);Port=5432;Database=$(IDENTITY_DB_NAME);Username=$(IDENTITY_DB_USER);Password=$(IDENTITY_DB_PASSWORD)"
        - name: IDENTITY_DB_HOST
          valueFrom:
            configMapKeyRef:
              name: agrosolutions-config
              key: IDENTITY_DB_HOST
        - name: IDENTITY_DB_NAME
          valueFrom:
            configMapKeyRef:
              name: agrosolutions-config
              key: IDENTITY_DB_NAME
        - name: IDENTITY_DB_USER
          valueFrom:
            configMapKeyRef:
              name: agrosolutions-config
              key: IDENTITY_DB_USER
        - name: IDENTITY_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: agrosolutions-secrets
              key: IDENTITY_DB_PASSWORD
        - name: Jwt__Key
          valueFrom:
            secretKeyRef:
              name: agrosolutions-secrets
              key: JWT_SECRET
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: identity-api-service
  namespace: agrosolutions
spec:
  selector:
    app: identity-api
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP