apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-api
  namespace: agrosolutions
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity-api
  template:
    metadata:
      labels:
        app: identity-api
    spec:
      containers:
      - name: identity-api
        image: devjoaomelo/agrosolutions-identity:latest
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ConnectionStrings__DefaultConnection
          value: "Host=postgres-identity;Port=5432;Database=identity_db;Username=identity_user;Password=password"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: identity-api-service
  namespace: agrosolutions
spec:
  selector:
    app: identity-api
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP