apiVersion: v1
kind: ConfigMap
metadata:
  name: agrosolutions-config
  namespace: agrosolutions
data:
  # RabbitMQ
  RABBITMQ_HOST: "rabbitmq-service"
  RABBITMQ_USERNAME: "guest"
  
  # Database Hosts
  IDENTITY_DB_HOST: "postgres-identity"
  PROPERTY_DB_HOST: "postgres-property"
  INGESTION_DB_HOST: "postgres-ingestion"
  ALERTS_DB_HOST: "postgres-alerts"
  
  # Database Names
  IDENTITY_DB_NAME: "identity_db"
  PROPERTY_DB_NAME: "property_db"
  INGESTION_DB_NAME: "ingestion_db"
  ALERTS_DB_NAME: "alerts_db"
  
  # Database Users
  IDENTITY_DB_USER: "identity_user"
  PROPERTY_DB_USER: "property_user"
  INGESTION_DB_USER: "ingestion_user"
  ALERTS_DB_USER: "alerts_user"
  
  # Environment
  ASPNETCORE_ENVIRONMENT: "Production"
