apiVersion: apps/v1
kind: Deployment
metadata:
  name: alerts-api
  namespace: agrosolutions
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alerts-api
  template:
    metadata:
      labels:
        app: alerts-api
    spec:
      containers:
      - name: alerts-api
        image: devjoaomelo/agrosolutions-alerts:latest
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: agrosolutions-config
              key: ASPNETCORE_ENVIRONMENT
        - name: ConnectionStrings__DefaultConnection
          value: "Host=$(ALERTS_DB_HOST);Port=5432;Database=$(ALERTS_DB_NAME);Username=$(ALERTS_DB_USER);Password=$(ALERTS_DB_PASSWORD)"
        - name: ALERTS_DB_HOST
          valueFrom:
            configMapKeyRef:
              name: agrosolutions-config
              key: ALERTS_DB_HOST
        - name: ALERTS_DB_NAME
          valueFrom:
            configMapKeyRef:
              name: agrosolutions-config
              key: ALERTS_DB_NAME
        - name: ALERTS_DB_USER
          valueFrom:
            configMapKeyRef:
              name: agrosolutions-config
              key: ALERTS_DB_USER
        - name: ALERTS_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: agrosolutions-secrets
              key: ALERTS_DB_PASSWORD
        - name: RabbitMQ__Host
          valueFrom:
            configMapKeyRef:
              name: agrosolutions-config
              key: RABBITMQ_HOST
        - name: RabbitMQ__Username
          valueFrom:
            configMapKeyRef:
              name: agrosolutions-config
              key: RABBITMQ_USERNAME
        - name: RabbitMQ__Password
          valueFrom:
            secretKeyRef:
              name: agrosolutions-secrets
              key: RABBITMQ_PASSWORD
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: alerts-api-service
  namespace: agrosolutions
spec:
  selector:
    app: alerts-api
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP